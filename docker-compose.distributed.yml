services:
  balancer:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - ROLE=balancer
      - BALANCER_ADDR=0.0.0.0:8080
      - DB_PATH=/data/flakyollama.db
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
    volumes:
      - balancer_data:/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    network_mode: host
    environment:
      - BACKEND_URL=http://localhost:8080
      - VITE_BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
    restart: always

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - ROLE=agent
      - AGENT_ID=${HOSTNAME:-agent-1}
      - BALANCER_URL=http://localhost:8080 # Update to Balancer IP if on different nodes
      - OLLAMA_URL=http://localhost:11434  # Reaches Ollama on host or in container via host network
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
      - OIDC_ENABLED=true
      - OIDC_ISSUER=https://openid.kiliansen.de
      - OIDC_CLIENT_ID=298ae376-5390-4330-809b-b5db104e5dd6
      - OIDC_CLIENT_SECRET=1He5qvuu8fRfE6A9BdQ01kfbM25neG1H
      - OIDC_REDIRECT_URL=http://localhost:5173/auth/callback
      - OIDC_ADMIN_CLAIM=groups
      - OIDC_ADMIN_VALUE=admin
    restart: always

volumes:
  balancer_data:
  ollama_data:
