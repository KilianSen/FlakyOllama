services:
  balancer:
    image: ghcr.io/kiliansen/flakyollama-balancer:latest
    ports:
      - "8080:8080"
    environment:
      - ROLE=balancer
      - BALANCER_ADDR=0.0.0.0:8080
      - DB_PATH=/data/flakyollama.db
      - BALANCER_TOKEN=your-secret-balancer-token
      - AGENT_TOKEN=your-secret-agent-token
      # - CONFIG_PATH=/data/config.json # Uncomment to use a config file
      # - TLS_ENABLED=true             # Future: Add direct env mapping for TLS
    volumes:
      - balancer_data:/data
      # - ./certs:/etc/certs           # Uncomment to mount TLS certificates
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://balancer:8080
      - VITE_BALANCER_TOKEN=your-secret-balancer-token
    restart: always

  ollama-1:
    image: ollama/ollama:latest
    volumes:
      - agent1_ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  agent-1:
    image: ghcr.io/kiliansen/flakyollama-agent:latest
    environment:
      - ROLE=agent
      - AGENT_ID=gpu-node-1
      - BALANCER_URL=http://balancer:8080
      - OLLAMA_URL=http://ollama-1:11434
      - AGENT_TOKEN=your-secret-agent-token
      - BALANCER_TOKEN=your-secret-balancer-token
    volumes:
      - agent1_data:/data
    depends_on:
      - ollama-1
    restart: always

  ollama-2:
    image: ollama/ollama:latest
    volumes:
      - agent2_ollama:/root/.ollama
    restart: always

  agent-2:
    image: ghcr.io/kiliansen/flakyollama-agent:latest
    environment:
      - ROLE=agent
      - AGENT_ID=cpu-node-2
      - BALANCER_URL=http://balancer:8080
      - OLLAMA_URL=http://ollama-2:11434
      - AGENT_TOKEN=your-secret-agent-token
      - BALANCER_TOKEN=your-secret-balancer-token
    volumes:
      - agent2_data:/data
    depends_on:
      - ollama-2
    restart: always

volumes:
  balancer_data:
  agent1_data:
  agent1_ollama:
  agent2_data:
  agent2_ollama:
