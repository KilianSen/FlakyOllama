services:
  balancer:
    image: ghcr.io/kiliansen/flakyollama-balancer:latest
    ports:
      - "8080:8080"
    environment:
      - ROLE=balancer
      - BALANCER_ADDR=0.0.0.0:8080
      - DB_PATH=/data/flakyollama.db
      - BALANCER_TOKEN=your-secret-balancer-token
      - AGENT_TOKEN=your-secret-agent-token
    volumes:
      - balancer_data:/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://balancer:8080
      - VITE_BALANCER_TOKEN=your-secret-balancer-token
    restart: always

  agent-1:
    image: ghcr.io/kiliansen/flakyollama-integrated:latest
    environment:
      - ROLE=agent
      - AGENT_ID=gpu-node-1
      - BALANCER_URL=http://balancer:8080
      - AGENT_TOKEN=your-secret-agent-token
      - BALANCER_TOKEN=your-secret-balancer-token
    volumes:
      - agent1_data:/data
      - agent1_ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  agent-2:
    image: ghcr.io/kiliansen/flakyollama-integrated:latest
    environment:
      - ROLE=agent
      - AGENT_ID=cpu-node-2
      - BALANCER_URL=http://balancer:8080
      - AGENT_TOKEN=your-secret-agent-token
      - BALANCER_TOKEN=your-secret-balancer-token
    volumes:
      - agent2_data:/data
      - agent2_ollama:/root/.ollama
    restart: always

volumes:
  balancer_data:
  agent1_data:
  agent1_ollama:
  agent2_data:
  agent2_ollama:
