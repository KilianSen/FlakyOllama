version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    volumes:
      - openwebui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OAUTH_ADMIN_ROLES=admins'
      - 'OAUTH_CLIENT_ID=94e3d3fc-e850-4939-9f0d-e2e299f36cf8'
      - 'OAUTH_CLIENT_SECRET=vMBZB8P8YD8NJ6gSTjdz7JKjn1cpeRbx'
      - 'OAUTH_PROVIDER_NAME=OpenID'
      - 'OAUTH_ROLES_CLAIM=groups'
      - 'OAUTH_SCOPES=openid email profile groups'
      - 'OPENID_PROVIDER_URL=https://openid.kiliansen.de/.well-known/openid-configuration'
      - 'ENABLE_API_KEYS=True'
      - 'ENABLE_API_KEYS_ENDPOINT_RESTRICTIONS=True'
      - 'OLLAMA_BASE_URL=http://balancer:8080' # Fixed port to use internal balancer port
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  balancer:
    image: ghcr.io/kiliansen/flakyollama-balancer:latest
    ports:
      - target: 8080
        published: 14210
        protocol: tcp
        mode: ingress
    environment:
      - ROLE=balancer
      - BALANCER_ADDR=0.0.0.0:8080
      - DB_PATH=/data/flakyollama.db
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
    volumes:
      - balancer_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager # Ensure database remains on a manager node
      restart_policy:
        condition: on-failure

  frontend:
    image: ghcr.io/kiliansen/flakyollama-frontend:latest
    ports:
      - target: 80
        published: 28540
        protocol: tcp
        mode: ingress
    environment:
      - BACKEND_URL=http://balancer:8080
      - VITE_BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  agent:
    image: ghcr.io/kiliansen/flakyollama-integrated:latest
    environment:
      - ROLE=agent
      - AGENT_ID={{.Node.Hostname}}{{.Task.Slot}}
      - BALANCER_URL=http://balancer:8080
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
    volumes:
      - agent_data:/data
      - agent_ollama:/root/.ollama
    deploy:
      mode: global # One agent per node in the cluster
      restart_policy:
        condition: any

volumes:
  openwebui:
    external: true
  balancer_data:
  agent_data:
  agent_ollama:
