version: '3.8'

services:
  balancer:
    image: ghcr.io/kiliansen/flakyollama-balancer:latest
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
    environment:
      - ROLE=balancer
      - BALANCER_ADDR=0.0.0.0:8080
      - DB_PATH=/data/flakyollama.db
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
    volumes:
      - balancer_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: ghcr.io/kiliansen/flakyollama-frontend:latest
    ports:
      - target: 80
        published: 3000
        protocol: tcp
        mode: ingress
    environment:
      - BACKEND_URL=http://balancer:8080
      - VITE_BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
    deploy:
      replicas: 1

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - host
    deploy:
      mode: global
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agent:
    image: ghcr.io/kiliansen/flakyollama-balancer:latest
    environment:
      - ROLE=agent
      - AGENT_ID={{.Node.Hostname}}
      - BALANCER_URL=http://127.0.0.1:8080 # Reaches Balancer via Swarm Ingress Mesh (forced IPv4)
      - OLLAMA_URL=http://localhost:11434 # Reaches Ollama on host
      - AGENT_TOKEN=${AGENT_TOKEN:-your-secret-agent-token}
      - BALANCER_TOKEN=${BALANCER_TOKEN:-your-secret-balancer-token}
    networks:
      - host
    deploy:
      mode: global

networks:
  host:
    name: host
    external: true

volumes:
  balancer_data:
  ollama_data:
